<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 280">
  <rect width="480" height="280" fill="#F8F7FF"/>
  <rect width="480" height="48" fill="#534AB7"/>
  <text x="240" y="30" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="white">Body Planes &amp; Directional Terms</text>
  <text x="240" y="43" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#C5C2F5">Applied Anatomy · Chapter 1 — Reference Chart</text>

  <!-- Sagittal Plane (correct for Q2) -->
  <rect x="14" y="60" width="215" height="100" fill="#EEEDFE" rx="10"/>
  <rect x="14" y="60" width="215" height="100" fill="none" stroke="#534AB7" stroke-width="2" rx="10"/>
  <text x="28" y="81" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#3C3489">Sagittal Plane ✓</text>
  <rect x="28" y="85" width="36" height="2" fill="#534AB7" rx="1"/>
  <text x="28" y="103" font-family="Arial,sans-serif" font-size="11" fill="#534AB7">Divides: LEFT / RIGHT halves</text>
  <text x="28" y="120" font-family="Arial,sans-serif" font-size="10" fill="#5a5a78">Vertical, front-to-back cut</text>
  <text x="28" y="135" font-family="Arial,sans-serif" font-size="10" fill="#5a5a78">Midsagittal = equal halves</text>
  <text x="198" y="140" text-anchor="end" font-family="Arial,sans-serif" font-size="22" font-weight="bold" fill="#534AB7">L | R</text>

  <!-- Coronal Plane (wrong) -->
  <rect x="251" y="60" width="215" height="100" fill="#FFF8F8" rx="10"/>
  <rect x="251" y="60" width="215" height="100" fill="none" stroke="#F09595" stroke-width="1.5" rx="10"/>
  <text x="265" y="81" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#791F1F">Coronal / Frontal Plane</text>
  <text x="265" y="103" font-family="Arial,sans-serif" font-size="11" fill="#A32D2D">Divides: ANTERIOR / POSTERIOR</text>
  <text x="265" y="120" font-family="Arial,sans-serif" font-size="10" fill="#5a5a78">Vertical, side-to-side cut</text>
  <text x="265" y="135" font-family="Arial,sans-serif" font-size="10" fill="#5a5a78">Front and back halves</text>
  <text x="456" y="140" text-anchor="end" font-family="Arial,sans-serif" font-size="18" fill="#F09595">A | P</text>

  <!-- Transverse Plane (wrong) -->
  <rect x="14" y="172" width="215" height="96" fill="#FFF8F8" rx="10"/>
  <rect x="14" y="172" width="215" height="96" fill="none" stroke="#F09595" stroke-width="1.5" rx="10"/>
  <text x="28" y="193" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#791F1F">Transverse / Horizontal</text>
  <text x="28" y="213" font-family="Arial,sans-serif" font-size="11" fill="#A32D2D">Divides: SUPERIOR / INFERIOR</text>
  <text x="28" y="230" font-family="Arial,sans-serif" font-size="10" fill="#5a5a78">Horizontal cross-section</text>
  <text x="28" y="246" font-family="Arial,sans-serif" font-size="10" fill="#5a5a78">Upper and lower halves</text>
  <text x="204" y="258" text-anchor="end" font-family="Arial,sans-serif" font-size="18" fill="#F09595">S ─ I</text>

  <!-- Directional Terms quick ref -->
  <rect x="251" y="172" width="215" height="96" fill="#F0EFFE" rx="10"/>
  <text x="265" y="193" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#3C3489">Key Directional Terms</text>
  <text x="265" y="211" font-family="Arial,sans-serif" font-size="10" fill="#534AB7">Superior = above (cranial end)</text>
  <text x="265" y="227" font-family="Arial,sans-serif" font-size="10" fill="#534AB7">Inferior = below (caudal end)</text>
  <text x="265" y="243" font-family="Arial,sans-serif" font-size="10" fill="#534AB7">Anterior / Ventral = front</text>
  <text x="265" y="259" font-family="Arial,sans-serif" font-size="10" fill="#534AB7">Posterior / Dorsal = back</text>
  <rect x="265" y="198" width="3" height="64" fill="#534AB7" rx="1.5"/>
</svg>
